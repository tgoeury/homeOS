name: Build and Push Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:  # déclenchement manuel depuis GitHub si besoin

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # nécessaire pour pousser vers GHCR

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup QEMU (émulation arm64 sur le runner amd64)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login vers GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-généré, rien à configurer

      - name: Extraction des métadonnées (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Première build arm64 : ~10-15 min (QEMU + onnxruntime ~100 Mo, bien plus léger que torch)
      # Builds suivantes : quelques minutes grâce au cache GHA (layer pip figé)
      - name: Build et push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false  # évite les attestations GHCR qui alourdissent le manifest
